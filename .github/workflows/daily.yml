import os
import time
import requests
from newsapi import NewsApiClient
from google import genai

# Environment Secrets
TELEGRAM_TOKEN = os.getenv("TELEGRAM_TOKEN")
TELEGRAM_CHAT_ID = os.getenv("TELEGRAM_CHAT_ID")
NEWS_API_KEY = os.getenv("NEWS_API_KEY")
GEMINI_API_KEY = os.getenv("GEMINI_API_KEY")

def send_to_telegram(text):
    url = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage"
    payload = {"chat_id": TELEGRAM_CHAT_ID, "text": text, "parse_mode": "Markdown"}
    try:
        response = requests.post(url, data=payload)
        response.raise_for_status()
    except Exception as e:
        print(f"Telegram Error: {e}")

def run_agent():
    newsapi = NewsApiClient(api_key=NEWS_API_KEY)
    client = genai.Client(api_key=GEMINI_API_KEY)

    # Optimized Query for 2026 Civic Sense News in India
    query = '(civic sense OR "public etiquette") AND (India OR Nagpur OR Maharashtra)'
    articles = newsapi.get_everything(q=query, language='en', sort_by='relevancy', page_size=2)

    if not articles.get('articles'):
        print("No articles found today.")
        return

    for art in articles['articles']:
        try:
            prompt = (
                f"Analyze this civic event: {art['title']}\n"
                f"Description: {art.get('description', 'N/A')}\n\n"
                "Create a report with a 2-sentence summary and a practical 'Civic Lesson' for our audience."
            )
            
            # MODEL UPDATE: Use gemini-3-flash for the 2026 Free Tier
            response = client.models.generate_content(
                model="gemini-3-flash", 
                contents=prompt
            )
            
            report = f"🇮🇳 *Civic Sense Report*\n\n{response.text}\n\n#Nagpur #CivicSense"
            send_to_telegram(report)
            
            # RATE LIMIT PROTECTION: Sleep 10s to avoid 429 Resource Exhausted errors
            time.sleep(10) 

        except Exception as e:
            print(f"Error processing article: {e}")

if __name__ == "__main__":
    run_agent()
